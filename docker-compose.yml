version: '3.8'

services:
  db:
    image: postgres:15
    container_name: iam_postgres
    environment:
      POSTGRES_DB: iam_db
      POSTGRES_USER: iam_admin
      POSTGRES_PASSWORD: iam_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iam_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_admin -d iam_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    container_name: iam_redis
    ports:
      - '6379:6379'
    networks:
      - iam_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Keycloak needs its own DB to persist admin settings
  keycloak_db:
    image: postgres:15
    container_name: iam_keycloak_db
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    networks:
      - iam_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: iam_keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HTTP_PORT: "8080"
    ports:
      - '8080:8080'
    command: start-dev
    depends_on:
      keycloak_db:
        condition: service_healthy
    networks:
      - iam_net

  backend:
    build: ./backend
    container_name: iam_backend
    environment:
      DATABASE_URL: postgresql://iam_admin:iam_password@db:5432/iam_db
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_URL: http://keycloak:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8000:8000'
    networks:
      - iam_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  # Celery worker — executes the actual tasks
  celery_worker:
    build: ./backend
    container_name: iam_celery_worker
    command: celery -A tasks worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://iam_admin:iam_password@db:5432/iam_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iam_net

  # Celery beat — triggers tasks on the schedule defined in tasks.py
  celery_beat:
    build: ./backend
    container_name: iam_celery_beat
    command: celery -A tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://iam_admin:iam_password@db:5432/iam_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iam_net

  frontend:
    build: ./frontend
    container_name: iam_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - '3000:3000'
    networks:
      - iam_net

  nginx:
    image: nginx:latest
    container_name: iam_nginx
    ports:
      - '80:80'
    volumes:
      - ./infrastructure/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - iam_net

volumes:
  postgres_data:
  keycloak_data:

networks:
  iam_net:
    driver: bridge