# Nginx configuration for IAM Governance Platform

worker_processes 1;
events { worker_connections 1024; }
http {
    upstream backend {
        server iam_backend:8000;
    }
    upstream frontend {
        server iam_frontend:3000;
    }
    server {
        listen 80;
        location /api/ {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
