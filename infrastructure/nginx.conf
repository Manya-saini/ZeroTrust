worker_processes 1;
events { worker_connections 1024; }

http {
    upstream backend  { server iam_backend:8000;  }
    upstream frontend { server iam_frontend:3000; }

    server {
        listen 80;

        # /api/users → backend gets /users  (trailing slash on proxy_pass does the strip)
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Next.js hot-reload websocket
        location /_next/webpack-hmr {
            proxy_pass         http://frontend/_next/webpack-hmr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # everything else → frontend
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 60s;
        }
    }
}